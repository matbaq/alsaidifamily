name: family_tree
description: "تطبيق شجرة عائلة السعيدي"
version: 1.1.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  firebase_core: ^3.1.1
  firebase_auth: ^5.1.1
  cloud_firestore: ^5.0.2
  firebase_storage: ^12.0.1

  graphview: ^1.2.0

  image_picker: ^1.1.2
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3

  package_info_plus: ^8.0.0
  url_launcher: ^6.3.0

  screenshot: ^3.0.0
  share_plus: ^10.0.0
  pdf: ^3.11.1
  printing: ^5.13.0

  provider: ^6.1.2
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/icon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"