workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60

    integrations:
      app_store_connect: maqfamily

    environment:
      flutter: stable
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.alsaidi.familytree.familytree

    scripts:
      - name: Install dependencies
        script: |
          flutter pub get

      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration